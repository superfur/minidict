name: Release

# 打 v* tag 时自动发布到 npm。流程：lint/test/build → 校验 tag 与版本一致 → npm publish。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # npm provenance 需要

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run test
      - run: bun run build

      - name: Verify tag matches package.json version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME#v}
          echo "package.json=$PKG tag=$TAG"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag ($TAG) 与 package.json 版本 ($PKG) 不一致"
            exit 1
          fi

      - name: Setup Node for npm auth
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      # prepublishOnly 会再跑一次 bun run build（bun 已在 PATH）。
      # provenance 若因 token 类型不支持可去掉 --provenance。
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
